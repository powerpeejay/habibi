<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <title>OG Image · New Look by Habibi</title>
  <link rel="stylesheet" href="/fonts/fonts.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1200px; height: 630px; overflow: hidden; }
    body {
      background: #0d0a08;
      color: #faf7f2;
      font-family: 'Inter', system-ui, sans-serif;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center;
      position: relative;
      padding: 64px;
    }
    /* Saffron glow from below */
    body::before {
      content: '';
      position: absolute; left: 50%; bottom: -120px; transform: translateX(-50%);
      width: 1500px; height: 700px;
      background: radial-gradient(ellipse at center bottom, rgba(255,122,44,0.30) 0%, transparent 60%);
      z-index: 0;
    }
    /* Grain */
    body::after {
      content: '';
      position: absolute; inset: 0;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.6'/></svg>");
      opacity: 0.06;
      mix-blend-mode: screen;
      z-index: 0;
      pointer-events: none;
    }
    .wrap { position: relative; z-index: 1; }
    .eyebrow {
      font-size: 13px; font-weight: 500; letter-spacing: 0.20em;
      text-transform: uppercase; color: rgba(181,168,153,0.9);
      margin-bottom: 26px;
    }
    .wordmark {
      font-family: 'Sacramento', cursive;
      font-weight: 400;
      font-size: 144px; line-height: 0.95;
      letter-spacing: -0.01em;
      color: #faf7f2;
      text-shadow:
        0 0 48px rgba(255,122,44,0.42),
        0 0 14px rgba(250,247,242,0.18);
      margin-bottom: 22px;
    }
    .bar {
      width: 80px; height: 1px;
      background: #ff7a2c;
      opacity: 0.7;
      margin: 0 auto 26px;
    }
    h1 {
      font-family: 'Fraunces', Georgia, serif;
      font-style: italic;
      font-weight: 500;
      font-size: 60px;
      letter-spacing: -0.025em;
      line-height: 1.05;
      color: #faf7f2;
      margin-bottom: 24px;
    }
    h1 .acc {
      color: #ff7a2c;
      text-shadow: 0 0 20px rgba(255,122,44,0.6);
      font-style: italic;
    }
    .meta {
      font-size: 17px;
      color: rgba(181,168,153,0.95);
      letter-spacing: 0.06em;
      font-weight: 500;
    }
    .meta strong {
      color: #faf7f2;
      font-weight: 600;
    }
    .meta .sep {
      display: inline-block;
      margin: 0 12px;
      color: #ff7a2c;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="eyebrow">Friseur · Hamburg-Meiendorf</div>
    <div class="wordmark">New Look by Habibi</div>
    <div class="bar"></div>
    <h1>Willkommen, <span class="acc">Habibi</span>.</h1>
    <div class="meta">Meiendorfer Str. 115<span class="sep">·</span><strong>040 8787 5437</strong></div>
  </div>
</body>
</html>
